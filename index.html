<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CLASSIFIED OPS LOGIN</title>
  <style>
    body {
      background-color: black;
      color: #00FF00;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    input, button {
      margin: 10px;
      padding: 10px;
      font-size: 18px;
      background-color: #111;
      color: #00FF00;
      border: 2px solid #00FF00;
    }

    #hint {
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>

  <h1>TOP SECRET ACCESS</h1>
  <p>ENTER LAUNCH AUTHORIZATION PASSWORD</p>
  
  <input type="password" id="password" placeholder="••••••••••••">
  <button onclick="checkPassword()">ENTER</button>
  <p id="hint">Hint: Nuke Nuke and Nuke</p>

  <audio id="beep" src="https://www.soundjay.com/button/beep-07.wav" preload="auto"></audio>

  <script>
    function checkPassword() {
      const input = document.getElementById('password').value;
      if (input === "NukeEm") {
        alert("Password accepted. Secure login.");
        window.location.href = "control_panel.html";
      } else {
        document.body.innerHTML = `
          <h1>ACCESS DENIED</h1>
          <p>Abort sequence initiated...</p>
          <p>You've been betrayed.</p>
          <p id="countdown">Redirecting in 10</p>
        `;
        let beep = document.getElementById("beep");
        let seconds = 10;

        const countdown = setInterval(() => {
          seconds--;
          document.getElementById('countdown').innerText = \`Redirecting in \${seconds}\`;
          if (seconds <= 3) beep.play();

          if (seconds === 0) {
            clearInterval(countdown);
            window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
          }
        }, 1000);
      }
    }
  </script>

</body>
</html>
