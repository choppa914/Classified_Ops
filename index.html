<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classified Login Terminal</title>
  <style>
    body {
      background-color: black;
      color: lime;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    input {
      background: black;
      color: lime;
      border: 1px solid lime;
      font-family: monospace;
      padding: 10px;
      font-size: 1rem;
      margin-top: 10px;
    }
    #message, #countdown, #betrayal {
      margin-top: 20px;
      font-size: 1.2rem;
    }
    .blink {
      animation: blink 1s step-start infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <h1>CLASSIFIED ACCESS PORTAL</h1>
  <p>Enter Access Password:</p>
  <input type="password" id="passwordInput" placeholder="••••••">
  <button onclick="checkPassword()">Login</button>
  <p><em>Hint: Nuke Nuke and Nuke</em></p>

  <div id="message"></div>
  <div id="countdown"></div>
  <div id="betrayal"></div>

  <audio id="beep">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
  </audio>
  <audio id="longbeep">
    <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" type="audio/ogg">
  </audio>

  <script>
    function checkPassword() {
      const input = document.getElementById('passwordInput').value;
      const message = document.getElementById('message');
      const countdown = document.getElementById('countdown');
      const betrayal = document.getElementById('betrayal');

      if (input === 'NukeEm') {
        message.innerHTML = '<span class="blink">Access Granted. Safely Logged In.</span>';
        setTimeout(() => {
          window.location.href = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';
        }, 2000);
      } else {
        let timeLeft = 10;
        message.innerHTML = '<span class="blink">Intrusion Detected... ABORT SEQUENCE INITIATED</span>';
        const beep = document.getElementById('beep');
        const longbeep = document.getElementById('longbeep');

        const countdownInterval = setInterval(() => {
          beep.play();
          countdown.innerText = `Self Destruct In: ${timeLeft} seconds`;
          timeLeft--;

          if (timeLeft < 0) {
            clearInterval(countdownInterval);
            countdown.innerText = '';
            betrayal.innerHTML = '<span class="blink">Betrayal Confirmed. Mission Compromised.</span>';
            longbeep.play();
            setTimeout(() => {
              window.location.href = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';
            }, 4000);
          }
        }, 1000);
      }
    }
  </script>
</body>
</html>
